apiVersion: apps/v1
kind: Deployment
metadata:
  name: holy-webserver
spec:
  replicas: 1
  selector: { matchLabels: { app: holy-webserver } }
  template:
    metadata: { labels: { app: holy-webserver } }
    spec:
      imagePullSecrets:
      - name: ghcr-creds
      containers:
      - name: server
        image: ghcr.io/uherman/holy-webserver:latest
        imagePullPolicy: Always
        ports: [{ containerPort: 8080 }]
        livenessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          requests:
            memory: "32Mi"
          limits:
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata: { name: holy-webserver }
spec:
  type: NodePort
  selector: { app: holy-webserver }
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: holy-webserver
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - holy.null.care
      secretName: holy-null-care-tls
  rules:
  - host: holy.null.care
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: holy-webserver
            port:
              number: 80
